services:
  db:
    image: postgres:16
    container_name: torneo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: torneo
      POSTGRES_PASSWORD: torneo
      POSTGRES_DB: torneo
    ports:
      - "5432:5432"
    volumes:
      - torneo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torneo -d torneo"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  torneo_pgdata:
